<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OpenClaw Model Picker</title>
  <style>
    body { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 24px; max-width: 820px; }
    .row { margin: 14px 0; }
    label { display: block; font-weight: 600; margin-bottom: 6px; }
    select, textarea, button { font-size: 14px; }
    select { width: 100%; padding: 8px; }
    textarea { width: 100%; height: 140px; padding: 8px; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    button { padding: 10px 14px; margin-right: 10px; }
    .hint { color: #555; font-size: 13px; }
    .status { margin-top: 14px; padding: 10px; background: #f6f6f6; border: 1px solid #ddd; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>Model Picker</h1>
  <div class="hint">Local-only tool (127.0.0.1). It only edits OpenClaw’s default primary model + fallback list.</div>

  <div class="row">
    <label for="primary">Primary model</label>
    <select id="primary"></select>
  </div>

  <div class="row">
    <label for="fallback">Fallback models (one per line, in order)</label>
    <textarea id="fallback" spellcheck="false"></textarea>
    <div class="hint">Example: <code>openrouter/openrouter/free</code></div>
  </div>

  <div class="row">
    <button id="save">Save</button>
    <button id="apply">Apply (restart gateway)</button>
    <button id="reload">Reload</button>
  </div>

  <div id="out" class="status">Loading…</div>

<script>
  const elPrimary = document.getElementById('primary');
  const elFallback = document.getElementById('fallback');
  const out = document.getElementById('out');

  function setOut(msg) { out.textContent = msg; }

  async function api(path, opts) {
    const res = await fetch(path, opts);
    const text = await res.text();
    let data;
    try { data = JSON.parse(text); } catch { data = { raw: text }; }
    if (!res.ok) throw new Error(data.error || ('Request failed: ' + res.status));
    return data;
  }

  function setOptions(options, selected) {
    elPrimary.innerHTML = '';
    for (const m of options) {
      const opt = document.createElement('option');
      opt.value = m;
      opt.textContent = m;
      if (m === selected) opt.selected = true;
      elPrimary.appendChild(opt);
    }
  }

  async function load() {
    setOut('Loading…');
    const s = await api('/api/status');
    setOptions(s.options || [], s.primary || '');
    elFallback.value = (s.fallback || []).join('\n');
    setOut('Loaded current settings.');
  }

  async function save() {
    setOut('Saving…');
    const primary = elPrimary.value;
    const fallback = elFallback.value;
    await api('/api/set', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ primary, fallback })
    });
    setOut('Saved. (Backup created automatically.)');
  }

  async function apply() {
    setOut('Applying (restarting gateway)…');
    await api('/api/apply', { method: 'POST' });
    setOut('Applied (gateway restarted).');
  }

  document.getElementById('reload').addEventListener('click', () => load().catch(e => setOut('Error: ' + e.message)));
  document.getElementById('save').addEventListener('click', () => save().catch(e => setOut('Error: ' + e.message)));
  document.getElementById('apply').addEventListener('click', () => apply().catch(e => setOut('Error: ' + e.message)));

  load().catch(e => setOut('Error: ' + e.message));
</script>
</body>
</html>
